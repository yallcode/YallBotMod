name: Build YallBotMod

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [Android32, Android64]

    name: ${{ matrix.target }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: mod

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          path: mod
          combine: true
          target: ${{ matrix.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: YallBot.geode
          path: ${{ steps.build.outputs.build-output }}
